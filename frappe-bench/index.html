<!DOCTYPE html>

<head>
  <!-- Pre-render theme to prevent flash of wrong theme -->
  <script>
    (function () {
      var stored = localStorage.getItem('th-theme');
      var valid = (stored === 'light' || stored === 'dark') ? stored : null;
      var theme = valid || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (!valid) localStorage.setItem('th-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frappe-bench/apps/tr_tradehub/frontend/package-lock.json
      - name: Install dependencies
        working-directory: frappe-bench/apps/tr_tradehub/frontend
        run: npm ci
      - name: Build
        working-directory: frappe-bench/apps/tr_tradehub/frontend
        run: npm run build
      - name: Copy 404.html for SPA routing
        working-directory: frappe-bench/apps/tr_tradehub/frontend
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frappe-bench/apps/tr_tradehub/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
